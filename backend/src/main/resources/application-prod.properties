# ===== Production Profile Configuration =====
server.port=${SERVER_PORT:8080}

# ===== Production Database (PostgreSQL / Neon) =====
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA & Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== JWT Security Secret =====
placify.jwt.secret=${JWT_SECRET}

# ===== Production Upload Path =====
placify.upload.dir=${UPLOAD_PATH:uploads/resumes}

# ===== CORS Configuration =====
placify.cors.allowed-origins=${ALLOWED_ORIGINS:${FRONTEND_URL:https://placify.vercel.app}}

# ===== Centralized Demo Credentials =====
placify.demo.admin.email=${DEMO_ADMIN_EMAIL:admin@placify.com}
placify.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}
placify.demo.student.email=${DEMO_STUDENT_EMAIL:student@placify.com}
placify.demo.student.password=${DEMO_STUDENT_PASSWORD:student123}

# ===== Security Hardening & Logging =====
server.error.include-stacktrace=never
server.error.include-message=always
logging.level.com.placify=INFO
logging.level.org.springframework.web=WARN
