<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Placify</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Placify</h1>
                <p>Create your student account</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (getUser()) window.location.href = 'dashboard.html';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw !== cpw) { showToast('Passwords do not match', 'error'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                const res = await api.register(
                    document.getElementById('name').value,
                    document.getElementById('email').value, pw
                );
                if (res.success) {
                    showToast('Account created! Please sign in.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1000);
                } else {
                    showToast(res.message || 'Registration failed', 'error');
                }
            } catch (err) {
                showToast('Registration failed. Try again.', 'error');
            }
            btn.disabled = false; btn.textContent = 'Create Account';
        });
    </script>
</body>
</html>
