<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Placify</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Placify</h1>
                <p>Sign in to your account</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Sign In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
            <div style="display: none;">
                <strong style="color:var(--text-secondary);">Demo Accounts:</strong><br>
                Student: student@placify.com / student123<br>
                Admin: admin@placify.com / admin123
            </div>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (getUser()) window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await api.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                if (res.success) {
                    setUser(res.data);
                    showToast('Welcome back, ' + res.data.name + '!', 'success');
                    setTimeout(() => {
                        window.location.href = res.data.role === 'ADMIN' ? 'admin.html' : 'dashboard.html';
                    }, 500);
                } else {
                    showToast(res.message || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Invalid email or password', 'error');
            }
            btn.disabled = false; btn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
